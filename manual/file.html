<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --accent:   #00ff88;
      --accent2:  #ff3c6e;
      --text:     #e8e8f0;
      --muted:    #555570;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* fondo con grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      width: 100%;
      max-width: 560px;
      padding: 2.5rem;
      box-shadow: 0 0 60px rgba(0,255,136,0.04);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    header {
      margin-bottom: 2rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    /* URL */
    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
    }

    /* Drop zone */
    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 2px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 1.2rem;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(0,255,136,0.03);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .drop-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .drop-label strong {
      color: var(--accent);
    }

    /* preview de archivos */
    #preview-list {
      list-style: none;
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #preview-list li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.5rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      animation: slideIn 0.2s ease;
    }

    #preview-list li .fname {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #preview-list li .fsize {
      color: var(--muted);
      flex-shrink: 0;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* método */
    .method-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .method-btn {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .method-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,255,136,0.06);
    }

    /* botón */
    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 2px;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover   { opacity: 0.88; }
    button[type="submit"]:active  { transform: scale(0.99); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    /* respuesta */
    #response {
      margin-top: 1.5rem;
      display: none;
    }

    #response .res-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.ok  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-dot.err { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    .status-code {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    #response pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }

    /* loading bar */
    #progress-bar {
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.3s;
      margin-bottom: 1rem;
      border-radius: 1px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <header>
    <p class="tag">// upload tester</p>
    <h1>File<span>.</span>Send</h1>
  </header>

  <form id="uploadForm">

    <div class="field">
      <label>Endpoint URL</label>
      <input type="text" id="url" value="http://localhost:3000/api/v1/testing" />
    </div>

    <div class="field">
      <label>Field name</label>
      <input type="text" id="fieldName" value="files" />
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple />
      <span class="drop-icon">⬆</span>
      <p class="drop-label">Arrastrá o <strong>seleccioná</strong> archivos</p>
    </div>

    <ul id="preview-list"></ul>

    <div id="progress-bar"></div>

    <button type="submit" id="submitBtn">Enviar</button>
  </form>

  <div id="response">
    <div class="res-header">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-code" id="statusCode"></span>
    </div>
    <pre id="responseBody"></pre>
  </div>
</div>

<script>
  const fileInput   = document.getElementById('fileInput');
  const previewList = document.getElementById('preview-list');
  const dropZone    = document.getElementById('dropZone');
  const progressBar = document.getElementById('progress-bar');
  const submitBtn   = document.getElementById('submitBtn');
  const response    = document.getElementById('response');
  const statusDot   = document.getElementById('statusDot');
  const statusCode  = document.getElementById('statusCode');
  const responseBody= document.getElementById('responseBody');

  const fmt = (bytes) => bytes < 1024
    ? bytes + ' B'
    : (bytes / 1024).toFixed(1) + ' KB';

  // drag & drop visual
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    fileInput.files = e.dataTransfer.files;
    renderPreview();
  });

  fileInput.addEventListener('change', renderPreview);

  function renderPreview() {
    previewList.innerHTML = '';
    for (const f of fileInput.files) {
      const li = document.createElement('li');
      li.innerHTML = `<span class="fname">${f.name}</span><span class="fsize">${fmt(f.size)}</span>`;
      previewList.appendChild(li);
    }
  }

  document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const url       = document.getElementById('url').value.trim();
    const fieldName = document.getElementById('fieldName').value.trim();
    const files     = fileInput.files;

    if (!url) return alert('Ingresá una URL');

    const form = new FormData();
    for (const f of files) form.append(fieldName, f);

    submitBtn.disabled = true;
    progressBar.style.display = 'block';
    progressBar.style.width = '30%';

    try {
      progressBar.style.width = '70%';

      const res = await fetch(url, { method: 'POST', body: form });

      progressBar.style.width = '100%';
      setTimeout(() => { progressBar.style.display = 'none'; progressBar.style.width = '0%'; }, 400);

      let body;
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('application/json')) {
        body = JSON.stringify(await res.json(), null, 2);
      } else {
        body = await res.text();
      }

      // mostrar respuesta
      response.style.display = 'block';
      statusDot.className  = 'status-dot ' + (res.ok ? 'ok' : 'err');
      statusCode.textContent = `HTTP ${res.status} ${res.statusText}`;
      responseBody.textContent = body;

    } catch (err) {
      progressBar.style.display = 'none';
      response.style.display = 'block';
      statusDot.className  = 'status-dot err';
      statusCode.textContent = 'Error de red';
      responseBody.textContent = err.message;
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
